<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly</title>
  <meta name="description" content="The page you are looking for does not exist or has transitioned to another node.">
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    .error-card {
      text-align: center;
      max-width: 550px;
      width: 100%;
      padding: 3.5rem 2.5rem;
      border: 1px solid var(--color-border);
      background: rgba(255, 255, 255, 0.85);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
    .error-icon-glow {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-primary);
      font-size: 3rem;
      margin-bottom: 2rem;
      animation: float-icon 4s ease-in-out infinite;
    }
    .error-icon-glow::after {
      content: '';
      position: absolute;
      width: 120%;
      height: 120%;
      border-radius: 50%;
      border: 1px dashed rgba(16, 185, 129, 0.3);
      animation: spin-ring 20s linear infinite;
    }
    @keyframes float-icon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes spin-ring {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: 2.25rem;
      color: var(--color-text-primary);
      margin-bottom: 1rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      letter-spacing: -0.05em;
    }
    .error-desc {
      color: var(--color-text-secondary);
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2rem;
      background: var(--color-primary);
      color: white !important;
      font-weight: 600;
      border-radius: 30px;
      transition: var(--transition-normal);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    .btn-home:hover {
      background: var(--color-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.3);
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2rem;
      background: transparent;
      color: var(--color-text-primary) !important;
      border: 1px solid var(--color-border);
      font-weight: 600;
      border-radius: 30px;
      transition: var(--transition-normal);
      cursor: pointer;
    }
    .btn-back:hover {
      background: rgba(0, 0, 0, 0.05);
      border-color: var(--color-primary);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="error-page">

  <!-- Main Error Section -->
  <main class="error-container">
    <div class="error-card">
      <div class="error-icon-glow">
        <i class="fas fa-plug-circle-exclamation"></i>
      </div>
      <div class="error-code">404</div>
      <h1 class="error-title">Connection Offline</h1>
      <p class="error-desc">The requested social media node or service page is temporarily disconnected. Our energy storage routers are working to re-establish the feed.</p>
      <div style="display: flex; gap: 1rem; justify-content: center; align-items: center; flex-wrap: wrap;">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Go Back</a>
        <a href="index.html" class="btn-home"><i class="fas fa-house-chimney"></i> Return to Power Hub</a>
      </div>
    </div>
  </main>

</body>
</html>
