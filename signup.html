<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Console - Create Account</title>
  <meta name="description" content="Secure portal registration for Stackly EMS monitors.">
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    /* Fullscreen centering login/signup custom styles */
    .signup-body {
      background-image: linear-gradient(rgba(7, 9, 14, 0.8), rgba(7, 9, 14, 0.95)), url('assets/hero-slider-5.webp');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      box-sizing: border-box;
    }
    
    .signup-container {
      width: 100%;
      max-width: 440px;
      margin: auto;
    }

    .signup-card {
      padding: 1.75rem 1.75rem;
      border-radius: var(--border-radius-lg);
      width: 100%;
      box-sizing: border-box;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    .form-group input,
    .form-group select {
      background: var(--color-navy-light);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-sm);
      color: var(--color-text-primary);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition-fast);
      width: 100%;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
    }
    
    .form-group.has-error input {
      border-color: #ef4444 !important;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.25) !important;
    }
    
    .error-message {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.25rem;
      display: none;
    }
    
    .form-group.has-error .error-message {
      display: block;
    }

    .signup-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .signup-logo .logo {
      font-size: 1.85rem;
    }
  </style>
</head>
<body class="signup-body">

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <div class="signup-container">
    <div class="glass-card signup-card">
      <div class="signup-logo">
        <a href="index.html" class="logo">
          <img src="assets/logo stk.webp" alt="Stackly Logo" style="height: 38px; width: auto; object-fit: contain;">
        </a>
      </div>
      
      <h2 style="font-size: 1.5rem; margin-bottom: 0.35rem; text-align: center; font-family: var(--font-heading);">Create Account</h2>
      <p style="color: var(--color-text-secondary); font-size: 0.85rem; text-align: center; margin-bottom: 1rem;">Register to access the Stackly Console.</p>

      <form id="signup-form" novalidate>
        <!-- Full Name -->
        <div class="form-group" id="name-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe">
          <div class="error-message" id="name-error">Please enter your name.</div>
        </div>

        <!-- Role Selection -->
        <div class="form-group">
          <label for="signup-role">Select Security Role</label>
          <select id="signup-role">
            <option value="admin">Energy Administrator</option>
            <option value="analyst">Energy Analyst</option>
          </select>
        </div>

        <!-- Email input -->
        <div class="form-group" id="email-group">
          <label for="signup-email">Gmail Address</label>
          <input type="email" id="signup-email" placeholder="name@gmail.com">
          <div class="error-message" id="email-error">Please enter a valid @gmail.com address.</div>
        </div>

        <!-- Password input -->
        <div class="form-group" id="password-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="••••••••">
          <div class="error-message" id="password-error">Password cannot be empty.</div>
        </div>

        <!-- Confirm Password input -->
        <div class="form-group" id="confirm-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="••••••••">
          <div class="error-message" id="confirm-error">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">Sign Up <i class="fas fa-user-plus"></i></button>

        <!-- Back to Login -->
        <div style="text-align: center; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--color-border);">
          <span style="font-size: 0.82rem; color: var(--color-text-muted);">Already have an account?</span>
          <a href="login.html" style="font-size: 0.82rem; color: var(--color-primary); font-weight: 600; margin-left: 0.4rem; text-decoration: none; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">Log In</a>
        </div>
      </form>
      
      <div style="margin-top: 1.5rem; text-align: center;">
        <a href="index.html" style="font-size: 0.85rem; color: var(--color-text-muted);"><i class="fas fa-arrow-left" style="margin-right: 0.25rem;"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <!-- CDNs for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Global main JS for toast helper -->
  <script src="js/main.js"></script>
  
  <script>
    // Add input event listeners to clear error styles on type
    document.getElementById('signup-name').addEventListener('input', () => {
      document.getElementById('name-group').classList.remove('has-error');
    });
    
    document.getElementById('signup-email').addEventListener('input', () => {
      document.getElementById('email-group').classList.remove('has-error');
    });
    
    document.getElementById('signup-password').addEventListener('input', () => {
      document.getElementById('password-group').classList.remove('has-error');
    });

    document.getElementById('signup-confirm').addEventListener('input', () => {
      document.getElementById('confirm-group').classList.remove('has-error');
    });

    // Custom signup logic
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm').value;

      // Reset errors
      document.getElementById('name-group').classList.remove('has-error');
      document.getElementById('email-group').classList.remove('has-error');
      document.getElementById('password-group').classList.remove('has-error');
      document.getElementById('confirm-group').classList.remove('has-error');

      let isValid = true;

      // 1. Name check
      if (!name) {
        document.getElementById('name-group').classList.add('has-error');
        isValid = false;
      }

      // 2. Email format check (must end with @gmail.com)
      const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
      if (!gmailRegex.test(email)) {
        document.getElementById('email-group').classList.add('has-error');
        isValid = false;
      }

      // 3. Password validation (non-empty)
      if (!password) {
        document.getElementById('password-group').classList.add('has-error');
        isValid = false;
      }

      // 4. Confirm Password check
      if (password !== confirmPassword) {
        document.getElementById('confirm-group').classList.add('has-error');
        isValid = false;
      }

      if (!isValid) {
        return;
      }

      // 5. Successful registration and redirect
      const role = document.getElementById('signup-role').value;
      localStorage.setItem('registeredName_' + email, name);
      localStorage.setItem('registeredRole_' + email, role);
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
